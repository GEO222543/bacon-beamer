<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bacon Beamers Admin Login</title>
    <style>
      :root { color-scheme: dark; --bg:#05030d; --panel:rgba(16,10,30,0.84); --border:rgba(255,255,255,0.16); --text:#f8f4ff; --muted:#b8b0c8; --gold:#fbbf24; }
      * { box-sizing:border-box; }
      body { margin:0; min-height:100vh; font-family:Inter, 'Segoe UI', sans-serif; background:linear-gradient(135deg,#06020b,#140920 52%,#08050e); color:var(--text); display:grid; place-items:center; padding:24px; }
      .card { width:min(460px,100%); padding:28px; border-radius:24px; background:var(--panel); border:1px solid var(--border); box-shadow:0 20px 60px rgba(0,0,0,.35); backdrop-filter:blur(18px); }
      h1 { margin:0 0 10px; color:var(--gold); font-size:1.8rem; }
      p { color:var(--muted); line-height:1.55; }
      .field { display:grid; gap:6px; margin-top:14px; }
      input { width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--border); background:rgba(255,255,255,.06); color:var(--text); }
      .row { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:12px; color:var(--muted); font-size:.92rem; }
      .btn { width:100%; margin-top:16px; padding:12px 14px; border:none; border-radius:999px; cursor:pointer; background:linear-gradient(135deg,var(--gold),#f59e0b); color:#1d0f02; font-weight:800; }
      .link { color:#fde68a; text-decoration:none; }
      .hint { font-size:.9rem; color:var(--muted); margin-top:12px; }
      .status { min-height:20px; margin-top:10px; color:#fb7185; font-size:.95rem; }
      .toggle { cursor:pointer; color:#fbbf24; font-size:.9rem; }
      .pill { display:inline-block; padding:6px 10px; background:rgba(255,255,255,.08); border-radius:999px; font-size:.8rem; color:var(--muted); }
      @media (max-width: 480px){ .card{padding:22px;} }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🥓 Bacon Beamers Admin</h1>
      <p>Secure demo login for the fictional admin panel. Use the local demo credentials below.</p>
      <div class="hint"><span class="pill">Demo user: admin</span> <span class="pill">Password: bacon2025</span></div>
      <div class="field">
        <label>Username</label>
        <input id="username" value="admin" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" value="bacon2025" />
      </div>
      <div class="field">
        <label>2FA Code</label>
        <input id="totp" maxlength="6" placeholder="000000" />
      </div>
      <div class="row">
        <label><input id="remember" type="checkbox" /> Remember me</label>
        <span class="toggle" id="toggle-pass">Show password</span>
      </div>
      <button class="btn" id="login-btn">Unlock Admin</button>
      <div class="status" id="status">Demo mode · local access only</div>
      <p class="hint"><a class="link" href="/">← Back to Home</a></p>
    </div>
    <script>
      const STORAGE_KEY = 'bb-admin-auth';
      const ATTEMPT_KEY = 'bb-admin-attempts';
      const LOCK_KEY = 'bb-admin-lock-until';
      const PASS = 'bacon2025';
      const status = document.getElementById('status');
      const toggle = document.getElementById('toggle-pass');
      const passInput = document.getElementById('password');
      function getAttempts(){
        const raw = localStorage.getItem(ATTEMPT_KEY); return raw ? Number(raw) : 0;
      }
      function saveAttempts(n){ localStorage.setItem(ATTEMPT_KEY, String(n)); }
      function setLock(){ localStorage.setItem(LOCK_KEY, String(Date.now() + 15*60*1000)); }
      function lockActive(){ const until = Number(localStorage.getItem(LOCK_KEY) || 0); return until > Date.now(); }
      function tryUnlock(){
        const until = Number(localStorage.getItem(LOCK_KEY) || 0);
        if (until > Date.now()) {
          const mins = Math.ceil((until - Date.now()) / 60000);
          status.textContent = `Too many attempts. Try again in ${mins} minutes.`; return;
        }
        const user = document.getElementById('username').value.trim();
        const pass = passInput.value;
        const totp = document.getElementById('totp').value.trim();
        if (user === 'admin' && pass === PASS && (totp === '' || totp.length === 6)) {
          saveAttempts(0); localStorage.removeItem(LOCK_KEY);
          localStorage.setItem(STORAGE_KEY, 'demo');
          sessionStorage.setItem(STORAGE_KEY, 'demo');
          if (document.getElementById('remember').checked) localStorage.setItem(STORAGE_KEY + '-remember', 'true');
          window.location.href = '/admin.html';
        } else {
          const next = getAttempts() + 1;
          saveAttempts(next);
          if (next >= 5) { setLock(); status.textContent = 'Too many attempts. Try again in 15 minutes.'; }
          else { status.textContent = `Incorrect login. ${5-next} attempts remaining.`; }
        }
      }
      document.getElementById('login-btn').addEventListener('click', tryUnlock);
      toggle.addEventListener('click', () => {
        passInput.type = passInput.type === 'password' ? 'text' : 'password';
        toggle.textContent = passInput.type === 'password' ? 'Show password' : 'Hide password';
      });
      document.addEventListener('keydown', (event) => { if (event.key === 'Enter') tryUnlock(); });
    </script>
  </body>
</html>
